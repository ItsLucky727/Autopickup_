name: Build AutoPickup JAR

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn package -f AutoPickup/pom.xml

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: AutoPickup-JAR
          path: AutoPickup/target/AutoPickup-1.0.0.jar
